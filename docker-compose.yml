services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - mailpit
    networks:
      - skinsarena

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - skinsarena

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - skinsarena

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - skinsarena

  mailpit:
    image: axllent/mailpit:latest
    command:
      - --webroot=/mailpit
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8025/mailpit/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - skinsarena

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skinsarena
      POSTGRES_USER: skinsarena
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinsarena -d skinsarena"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skinsarena

  # Локально: без RDB на томе — избегает MISCONF/stop-writes-on-bgsave-error (Docker Desktop, права, полный диск).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save ""
      --appendonly no
      --stop-writes-on-bgsave-error no
    networks:
      - skinsarena

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      BACKEND_URL: http://nginx
    command: sh -c "npm ci 2>/dev/null || npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - skinsarena

networks:
  skinsarena:
    driver: bridge

# Тома сохраняются при `docker compose down` и перезапуске Docker.
# Данные Postgres пропадают если: (1) `docker compose down -v` — удаляет тома;
# (2) `make db-fresh` / `migrate:fresh` — том остаётся, но все таблицы и строки стираются.
volumes:
  postgres_data:
